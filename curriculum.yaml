stages:
  - id: "m00"
    title: "Module 00 — The Big Picture"
    items:
      - id: "00_overview"
        type: lesson
        file: 00-the-big-picture/README.md

      - id: "00_knowledge_check"
        type: exercise
        lesson: 00-the-big-picture/README.md
        verifier: quiz
        questions:
          - id: dns_step
            prompt: "Which of the 7 steps (1-7) resolves a hostname into an IP address?"
            answer: "2"
            accept: ["step 2", "two"]
          - id: refused_step
            prompt: "The error 'Connection refused' means which step failed?"
            answer: "3"
            accept: ["step 3", "three", "tcp"]
          - id: kex_step
            prompt: "Which step uses Diffie-Hellman to establish a shared secret?"
            answer: "5"
            accept: ["step 5", "five", "key exchange", "kex"]
          - id: ssh_port
            prompt: "What TCP port does SSH listen on by default?"
            answer: "22"
            accept: ["port 22"]

      - id: "00_parse_ssh_command"
        type: exercise
        lesson: lessons/m00/01_parse_ssh_command.md
        exercise: exercises/m00/parse_ssh_command.py
        original: originals/m00/parse_ssh_command.py
        test: tests/m00/test_parse_ssh_command.py
        hints: hints/m00/parse_ssh_command.md
        verifier: local

      - id: "00_dns_resolve"
        type: exercise
        lesson: lessons/m00/02_dns_resolve.md
        exercise: exercises/m00/dns_resolve.py
        original: originals/m00/dns_resolve.py
        test: tests/m00/test_dns_resolve.py
        hints: hints/m00/dns_resolve.md
        verifier: local

  - id: "m01"
    title: "Module 01 — SSH and Remote Access"
    items:
      - id: "01_overview"
        type: lesson
        file: 01-ssh-and-remote-access/README.md

      - id: "01_knowledge_check"
        type: exercise
        lesson: 01-ssh-and-remote-access/README.md
        verifier: quiz
        questions:
          - id: daemon_name
            prompt: "What server program listens on port 22 and accepts SSH connections?"
            answer: "sshd"
            accept: ["ssh daemon", "ssh-d", "openssh-server"]
          - id: known_hosts
            prompt: "What file on your Mac records the host keys of servers you've previously connected to?"
            answer: "known_hosts"
            accept: ["~/.ssh/known_hosts", ".ssh/known_hosts"]
          - id: perm_denied_meaning
            prompt: "Which part of the SSH connection failed when you see 'Permission denied'?"
            answer: "authentication"
            accept: ["auth", "user auth", "step 6", "6"]
          - id: refused_meaning
            prompt: "In one word: what's typically wrong when SSH returns 'Connection refused'?"
            answer: "sshd"
            accept: ["sshd not running", "not running", "port", "daemon", "nothing listening"]

      - id: "01_diagnose_ssh_error"
        type: exercise
        lesson: lessons/m01/01_diagnose_ssh_error.md
        exercise: exercises/m01/diagnose_ssh_error.py
        original: originals/m01/diagnose_ssh_error.py
        test: tests/m01/test_diagnose_ssh_error.py
        hints: hints/m01/diagnose_ssh_error.md
        verifier: local

      - id: "01_tcp_reachability"
        type: exercise
        lesson: lessons/m01/02_tcp_reachability.md
        hints: hints/m01/tcp_reachability.md
        verifier: command
        command_checks:
          - name: "you captured nc output to /tmp/net_probe.txt"
            command: "test -f /tmp/net_probe.txt"
            expect_returncode: 0
          - name: "/tmp/net_probe.txt shows a successful TCP connection"
            command: "grep -qE '(succeeded|Connected|open|SSH-)' /tmp/net_probe.txt"
            expect_returncode: 0

  - id: "m02"
    title: "Module 02 — Shell and Keys"
    items:
      - id: "02_overview"
        type: lesson
        file: 02-shell-and-keys/README.md

      - id: "02_knowledge_check"
        type: exercise
        lesson: 02-shell-and-keys/README.md
        verifier: quiz
        questions:
          - id: preferred_key_type
            prompt: "What modern key type should you prefer when generating a new SSH key?"
            answer: "ed25519"
            accept: ["ssh-ed25519", "ed-25519"]
          - id: authorized_keys
            prompt: "What filename on the server lists public keys allowed to log in as a given user?"
            answer: "authorized_keys"
            accept: ["~/.ssh/authorized_keys", ".ssh/authorized_keys"]
          - id: private_key_mode
            prompt: "What Unix permission mode (octal) should your SSH private key have?"
            answer: "600"
            accept: ["0600"]
          - id: ssh_config
            prompt: "What file controls per-host SSH client settings (aliases, identity files, etc.)?"
            answer: "~/.ssh/config"
            accept: ["config", ".ssh/config", "ssh config"]

      - id: "02_generate_keypair"
        type: exercise
        lesson: lessons/m02/01_generate_keypair.md
        hints: hints/m02/generate_keypair.md
        verifier: command
        command_checks:
          - name: "public key exists at ~/.ssh/id_ed25519_learn.pub"
            command: "test -f ~/.ssh/id_ed25519_learn.pub"
            expect_returncode: 0
          - name: "private key exists at ~/.ssh/id_ed25519_learn"
            command: "test -f ~/.ssh/id_ed25519_learn"
            expect_returncode: 0
          - name: "private key permission is 600"
            command: "stat -f '%A' ~/.ssh/id_ed25519_learn"
            expect_stdout_regex: "^600$"
          - name: "the key is ed25519 (not RSA)"
            command: "cat ~/.ssh/id_ed25519_learn.pub"
            expect_stdout_regex: "^ssh-ed25519 "

      - id: "02_inspect_pubkey"
        type: exercise
        lesson: lessons/m02/02_inspect_pubkey.md
        exercise: exercises/m02/inspect_pubkey.py
        original: originals/m02/inspect_pubkey.py
        test: tests/m02/test_inspect_pubkey.py
        hints: hints/m02/inspect_pubkey.md
        verifier: local

  - id: "m15"
    title: "Module 15 — Sockets, HTTP, and WebSockets"
    items:
      - id: "15_overview"
        type: lesson
        file: 15-sockets-http-websockets/README.md

      - id: "15_knowledge_check"
        type: exercise
        lesson: 15-sockets-http-websockets/README.md
        verifier: quiz
        questions:
          - id: https_port
            prompt: "What is the default TCP port for https?"
            answer: "443"
            accept: ["port 443"]
          - id: server_error_class
            prompt: "Which HTTP status-code class (1xx-5xx) means 'server error'?"
            answer: "5xx"
            accept: ["5", "500", "5**"]
          - id: header_terminator
            prompt: "What byte sequence marks the end of the HTTP headers section? (escape codes ok)"
            answer: "\\r\\n\\r\\n"
            accept: ["empty line", "blank line", "crlf crlf", "\\r\\n\\r\\n", "double crlf"]
          - id: ws_magic_guid
            prompt: "What GUID is appended to the client's key when computing Sec-WebSocket-Accept?"
            answer: "258EAFA5-E914-47DA-95CA-C5AB0DC85B11"
            accept: ["258eafa5-e914-47da-95ca-c5ab0dc85b11"]

      - id: "15_parse_url"
        type: exercise
        lesson: lessons/m15/01_parse_url.md
        exercise: exercises/m15/parse_url.py
        original: originals/m15/parse_url.py
        test: tests/m15/test_parse_url.py
        hints: hints/m15/parse_url.md
        verifier: local

      - id: "15_raw_http_get"
        type: exercise
        lesson: lessons/m15/02_raw_http_get.md
        exercise: exercises/m15/raw_http_get.py
        original: originals/m15/raw_http_get.py
        test: tests/m15/test_raw_http_get.py
        hints: hints/m15/raw_http_get.md
        verifier: local

      - id: "15_websocket_accept"
        type: exercise
        lesson: lessons/m15/03_websocket_accept.md
        exercise: exercises/m15/websocket_accept.py
        original: originals/m15/websocket_accept.py
        test: tests/m15/test_websocket_accept.py
        hints: hints/m15/websocket_accept.md
        verifier: local

      - id: "15_live_http_probe"
        type: exercise
        lesson: lessons/m15/04_live_http_probe.md
        hints: hints/m15/live_http_probe.md
        verifier: command
        command_checks:
          - name: "you captured curl status to /tmp/http_probe.txt"
            command: "test -f /tmp/http_probe.txt"
            expect_returncode: 0
          - name: "/tmp/http_probe.txt contains a 2xx or 3xx status code"
            command: "cat /tmp/http_probe.txt"
            expect_stdout_regex: "^[23][0-9][0-9]$"
